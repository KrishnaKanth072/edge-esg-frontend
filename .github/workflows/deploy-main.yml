name: Deploy to Main (Staging)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  test-and-security:
    name: Tests & Security Scans
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter (strict)
        run: npm run lint
      
      - name: Type check (strict)
        run: npx tsc --noEmit
      
      - name: Security audit (strict)
        run: npm audit --audit-level=moderate
      
      - name: Check for hardcoded secrets
        run: |
          if grep -r "password\s*=\s*['\"]" --include="*.ts" --include="*.tsx" --include="*.js" .; then
            echo "❌ Hardcoded passwords found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

  build-and-deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    needs: test-and-security
    environment:
      name: staging
      url: https://staging-edge-esg.vercel.app
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for staging
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.STAGING_WS_URL }}
          NEXT_PUBLIC_KEYCLOAK_URL: ${{ secrets.STAGING_KEYCLOAK_URL }}
          NEXT_PUBLIC_KEYCLOAK_REALM: ${{ secrets.STAGING_KEYCLOAK_REALM }}
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${{ secrets.STAGING_KEYCLOAK_CLIENT_ID }}
          NEXT_PUBLIC_ENVIRONMENT: staging
          NEXT_PUBLIC_LOG_LEVEL: info
          NEXT_PUBLIC_ENABLE_DEMO_MODE: true
          NEXT_PUBLIC_ENABLE_WEBSOCKET: true
          NEXT_PUBLIC_ENABLE_KEYCLOAK: true
      
      - name: Check build output
        run: |
          echo "📦 Staging build completed successfully"
          du -sh .next
          echo "✅ Ready for deployment"
      
      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build Status**: SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Bundle Size**: $(du -sh .next | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL**: https://staging-edge-esg.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Post-Deployment Checklist:" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify Vercel deployment completed" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test backend connection" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Test company analysis" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Check WebSocket updates" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Verify Keycloak login" >> $GITHUB_STEP_SUMMARY
