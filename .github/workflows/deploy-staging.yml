name: Deploy to Staging

on:
  push:
    branches: [staging, develop]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-edge-esg.vercel.app
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
        continue-on-error: true
      
      - name: Type check
        run: npx tsc --noEmit
      
      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true
      
      - name: Build for staging
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.STAGING_WS_URL }}
          NEXT_PUBLIC_KEYCLOAK_URL: ${{ secrets.STAGING_KEYCLOAK_URL }}
          NEXT_PUBLIC_KEYCLOAK_REALM: ${{ secrets.STAGING_KEYCLOAK_REALM }}
          NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${{ secrets.STAGING_KEYCLOAK_CLIENT_ID }}
          NEXT_PUBLIC_ENVIRONMENT: staging
          NEXT_PUBLIC_LOG_LEVEL: info
          NEXT_PUBLIC_ENABLE_DEMO_MODE: true
          NEXT_PUBLIC_ENABLE_WEBSOCKET: true
          NEXT_PUBLIC_ENABLE_KEYCLOAK: true
      
      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build Status**: SUCCESS" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Bundle Size**: $(du -sh .next | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL**: https://staging-edge-esg.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
